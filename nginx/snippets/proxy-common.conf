# Shared upstream proxy directives. Included by every location in the TLS server.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# Empty Connection header lets nginx reuse the upstream keepalive pool (ratchet
# streams over SSE, not WebSocket, so no Upgrade negotiation is needed).
proxy_set_header Connection "";

# Surface upstream-down as a clean 502 rather than hanging.
proxy_connect_timeout 5s;
